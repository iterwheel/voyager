version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      pytest:
        patterns: ["pytest*"]
      lint:
        patterns: ["ruff", "mypy", "bandit*", "pip-audit"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
