name: Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - "voyager/**"
      - "tests/**"
      - "pyproject.toml"

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run benchmarks
        run: pytest -m benchmark --benchmark-json=benchmark.json
        continue-on-error: true
      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json
