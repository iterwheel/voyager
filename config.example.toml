# Voyager config template — copy to one of the loader's default paths and edit.
#
# Loader search order (voyager/core/config.py):
#   1. $VOYAGER_CONFIG_PATH env override
#   2. ~/.voyager/config.toml
#   3. ./voyager.toml
#   4. /etc/voyager/config.toml
#
# The real config is machine-local and gitignored. Only this template ships
# in the repo.

[voyager]
work_dir = "~/.voyager/state"

# Optional: default investigator profile name (must match a [profiles.*] key below).
#
# Current Wukong canary behavior uses Flash no-thinking. Keep this default
# unless the operator explicitly promotes Clearance auto-resolve to a Pro-tier
# profile. Recommended production auto-resolve profile: "pro".
default_profile = "flash_no_thinking"

# Optional: DeepSeek API key. Read by the investigator at request time.
# Precedence (12-factor): if VOYAGER_DEEPSEEK_API_KEY is exported in the shell,
# the env wins; otherwise the value here is used. load_config() does NOT
# mutate os.environ — consumers combine cfg + env explicitly.
#
# To enable: uncomment the line below and replace with a real key.
# The line is commented out by default so an unedited copy of this template
# does not silently ship a placeholder string to the DeepSeek API.
#
# Note on storage: this file is the plaintext-at-rest tier — chmod 600 the
# real config.toml. For shared/multi-tenant hosts, prefer the env var and
# leave this field unset.
# deepseek_api_key = "sk-replace-with-real-key"


# --- GitHub Apps ---------------------------------------------------------
# One [[apps]] block per installed App. Webhook secrets are NOT stored
# here — they live in env vars named GITHUB_WEBHOOK_SECRET_<SLUG_UPPER>
# (e.g., GITHUB_WEBHOOK_SECRET_ITERWHEEL_CLEARANCE).
#
# Production writeback safety:
#   DRY_RUN defaults to true. To enable real writes, set DRY_RUN=false AND
#   set at least one repository allow-list env var.
#
# Global allow-list, used when no per-agent allow-list is set. Values are
# case-insensitive and can be exact repo names, '*' for all repos, or owner
# wildcards such as "frankyxhl/*":
#   BRIDGE_ALLOWED_REPOSITORIES="iterwheel/voyager-sandbox"
#
# Per-agent allow-list override. Agent slugs are uppercased with '-' replaced
# by '_'. Values use the same matching rules as the global allow-list:
#   BRIDGE_ALLOWED_REPOSITORIES_ITERWHEEL_CLEARANCE="iterwheel/voyager-sandbox"

# Assembly — code implementation bot. CHG-1817 (issue #69) wires the bridge
# route. Both knobs below are commented out by default so the bot stays
# default-deny (no GitHub mutations) until an operator opts in explicitly.
#
# Activate Assembly write-back on selected repositories (default: empty / deny):
#   BRIDGE_ALLOWED_REPOSITORIES_ITERWHEEL_ASSEMBLY="iterwheel/voyager-sandbox"
#
# Select the execution backend (default: dry-run records the contract without
# spawning any subprocess). fake-subprocess is a deterministic VOY-1821
# verification backend: it never invokes OMP, requires
# ASSEMBLY_FAKE_SUBPROCESS_ALLOW to be truthy before returning commits, and
# reads fixture JSON from ASSEMBLY_FAKE_SUBPROCESS_OUTPUT. The real
# pi-oh-my-pi-deepseek path invokes the Oh My Pi CLI (`omp -p`) and remains
# gated for a post-merge/deploy
# iterwheel/voyager-sandbox canary only.
#   ASSEMBLY_EXECUTION_BACKEND=dry-run
#   ASSEMBLY_EXECUTION_BACKEND=fake-subprocess
#   ASSEMBLY_FAKE_SUBPROCESS_ALLOW=1
#   ASSEMBLY_FAKE_SUBPROCESS_OUTPUT='{"status":"executed","commit_shas":["0123456789abcdef0123456789abcdef01234567"],"summary":"fake canary"}'
#   ASSEMBLY_EXECUTION_BACKEND=pi-oh-my-pi-deepseek
#   ASSEMBLY_PI_COMMAND_PATH=omp
#   ASSEMBLY_PI_TIMEOUT_SECONDS=900
#   ASSEMBLY_PI_WORKDIR=~/.voyager/state/assembly
#
# Optional operator-trusted verification override. Defaults remain
# Voyager-specific (`pytest tests/`, `ruff check .`, `mypy voyager`); use a
# repo-specific key when expanding Assembly beyond Voyager/sandbox. Commands
# are split on newlines or `;;`:
#   ASSEMBLY_VERIFICATION_COMMANDS_FRANKYXHL__TRINITY="make verify-built;;af validate --root ."
#
# Activate actor authorization (default: empty / deny). Either env var alone is
# sufficient — a comment is authorized when its login is on the allow-list OR
# its author_association is in the trusted set. Bot actors are always refused
# regardless of the lists. See VOY-1818 for the gate policy.
#   BRIDGE_ASSEMBLY_AUTHORIZED_ACTORS="frankyxhl ryosaeba1985"
#   BRIDGE_ASSEMBLY_AUTHORIZED_ASSOCIATIONS="OWNER MEMBER COLLABORATOR"
[[apps]]
slug = "iterwheel-assembly"
app_id = "3821103"
private_key_path = "~/.voyager/secrets/iterwheel-assembly.pem"
installation_id = ""

[apps.installations]
  "iterwheel" = "134829044"
  "frankyxhl" = "134830000"

[[apps]]
slug = "iterwheel-clearance"
app_id = "REPLACE_ME_APP_ID"
private_key_path = "~/.voyager/secrets/iterwheel-clearance.pem"
installation_id = "REPLACE_ME_INSTALLATION_ID"

[apps.installations]
# Optional per-repo or per-owner installation overrides:
#   "iterwheel/voyager-sandbox" = "130630338"
#   "iterwheel" = "130630338"


# --- Investigator profiles -----------------------------------------------
# Named param bundles for DeepSeek verdict investigation.
#
# Policy:
#   - Pro-tier profiles are the recommended production review-thread
#     auto-resolve path.
#   - Flash profiles are allowed for the current canary/advisory path only.
#     Keep min_confidence >= 0.90 while Flash remains selected.
#   - Promotion from Flash to Pro should be an explicit operator config change.

[profiles.flash]
model = "deepseek-v4-flash"
thinking = true
max_diff_chars = 12000
min_confidence = 0.90

[profiles.flash_no_thinking]
model = "deepseek-v4-flash"
thinking = false
max_diff_chars = 12000
min_confidence = 0.90

[profiles.pro]
model = "deepseek-v4-pro"
thinking = true
reasoning_effort = "medium"
max_diff_chars = 20000
min_confidence = 0.78

[profiles.pro_max]
model = "deepseek-v4-pro"
thinking = true
reasoning_effort = "max"
max_diff_chars = 40000
min_confidence = 0.85
